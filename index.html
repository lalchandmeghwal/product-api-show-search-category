<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Product Layout</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <h2>Logo</h2>
        </div>
        <nav class="nav">
            <ul>
                <li class="xmark"><i class="fa-solid fa-xmark"></i></li>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <span class="headerMenu"><i class="fa-solid fa-sliders"></i></span>
    </header>






    <div class="page-layout">
        <aside class="sidebar">
            <div class="sidebar-box"> 
                <span id="closeCategory"><i class="fa-solid fa-xmark"></i></span>
                <h2>Categories</h2>
               
                <ul class="category-list">
                    <!-- <li><a href="#">Electronics</a></li> -->

                </ul>
            </div>
        </aside>

        <main class="content">
            <div class="top">
                <form class="search-form">
                    <input type="search" name="search" placeholder="Search..." class="search-input">
                </form>
                <div class="buttons" >
                    <div class="pagination-controls">
                        <button type="button" class="page-button prev-button">Previous</button>
                        <p>Page 1 of 7</p>
                        <button type="button" class="page-button next-button">Next</button>
                    </div>
                    <span class="categoriesMenu"><i class="fa-solid fa-sliders"></i></span>
                </div>

            </div>




            <div class="card-grid">
                <!-- <div class="card">
                    <img class="card-image" src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=800&q=80" alt="Wireless Headphones">
                    <h3>Wireless Headphones</h3>
                    <p>High quality sound with premium comfort.</p>
                    <span class="price">$49</span>
                </div> -->


            </div>


        </main>
    </div>



    <footer class="footer">
        <div class="footer-content">
            <p>© 2023 Your Company. All rights reserved.</p>
            <nav class="footer-nav">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Contact Us</a>
            </nav>
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
